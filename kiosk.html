<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Lights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body, .kiosk-root { background: #0a0a0a; color: #e8e8e8; font-family: 'IBM Plex Sans', monospace; min-height: 100vh; }
  .kiosk-root { padding: 16px; display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; }
  .header { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; -webkit-justify-content: space-between; justify-content: space-between; padding: 0 4px 10px; border-bottom: 1px solid #222; margin-bottom: 14px; }
  .header-title { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 500; letter-spacing: 0.15em; color: #555; text-transform: uppercase; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #2d6a4f; display: inline-block; margin-right: 8px; }
  .status-dot.error { background: #8b2020; }
  .room-card { background: #111; border: 1px solid #1e1e1e; border-radius: 8px; overflow: hidden; margin-bottom: 14px; }
  .room-header { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; -webkit-justify-content: space-between; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #1a1a1a; }
  .room-name { font-family: 'IBM Plex Mono', monospace; font-size: 13px; letter-spacing: 0.2em; color: #cccccc; text-transform: uppercase; font-weight: 500; }
  .toggle-switch { position: relative; width: 44px; height: 24px; -webkit-flex-shrink: 0; flex-shrink: 0; }
  .toggle-switch input { display: none; }
  .toggle-track { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #222; border-radius: 12px; cursor: pointer; border: 1px solid #333; -webkit-transition: background 0.2s; transition: background 0.2s; }
  .toggle-track::after { content: ''; position: absolute; width: 18px; height: 18px; left: 2px; top: 2px; background: #555; border-radius: 50%; -webkit-transition: -webkit-transform 0.2s, background 0.2s; transition: transform 0.2s, background 0.2s; }
  .toggle-switch input:checked + .toggle-track { background: #1a3a2a; border-color: #2d6a4f; }
  .toggle-switch input:checked + .toggle-track::after { -webkit-transform: translateX(20px); transform: translateX(20px); background: #52b788; }
  .room-body { padding: 14px 16px; display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; }
  .room-body > * { margin-bottom: 12px; }
  .room-body > *:last-child { margin-bottom: 0; }
  .light-row { display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; padding: 12px 14px; background: #0d0d0d; border-radius: 6px; border: 1px solid #191919; margin-bottom: 8px; }
  .light-row > * { margin-bottom: 8px; }
  .light-row > *:last-child { margin-bottom: 0; }
  .light-top { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; -webkit-justify-content: space-between; justify-content: space-between; }
  .light-name { font-size: 15px; color: #ccc; font-weight: 400; }
  .light-name.on { color: #e8e8e8; }
  .brightness-row { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; margin-top: 2px; }
  .brightness-label { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #444; width: 36px; text-align: right; -webkit-flex-shrink: 0; flex-shrink: 0; margin-right: 10px; }
  .brightness-label.active { color: #666; }
  input[type=range] { -webkit-flex: 1; flex: 1; height: 4px; -webkit-appearance: none; appearance: none; background: #2a2a2a; border-radius: 2px; outline: none; cursor: pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #52b788; cursor: pointer; }
  input[type=range]:disabled::-webkit-slider-thumb { background: #333; }
  input[type=range]:disabled { opacity: 0.4; cursor: default; }
  .color-swatches { display: -webkit-flex; display: flex; -webkit-flex-wrap: wrap; flex-wrap: wrap; }
  .swatch { width: 28px; height: 28px; border-radius: 5px; cursor: pointer; border: 2px solid transparent; margin-right: 6px; margin-bottom: 6px; -webkit-flex-shrink: 0; flex-shrink: 0; }
  .swatch.active { border-color: #fff; }
  .scenes-row { display: -webkit-flex; display: flex; -webkit-flex-wrap: wrap; flex-wrap: wrap; }
  .scene-btn { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.08em; padding: 6px 12px; background: #161616; border: 1px solid #2a2a2a; color: #666; border-radius: 4px; cursor: pointer; text-transform: uppercase; white-space: nowrap; margin-right: 6px; margin-bottom: 6px; }
  .scene-btn.active { background: #1a3a2a; border-color: #52b788; color: #52b788; }
  .bedroom-toggle { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; -webkit-justify-content: space-between; justify-content: space-between; padding: 16px; background: #0d0d0d; border-radius: 6px; border: 1px solid #191919; }
  .bedroom-label { font-size: 16px; color: #ccc; }
  .big-toggle { width: 60px; height: 32px; }
  .big-toggle .toggle-track { border-radius: 16px; }
  .big-toggle .toggle-track::after { width: 24px; height: 24px; left: 3px; top: 3px; }
  .big-toggle input:checked + .toggle-track::after { -webkit-transform: translateX(27px); transform: translateX(27px); }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.15em; color: #444; text-transform: uppercase; margin-bottom: 6px; }
  .divider { height: 1px; background: #1a1a1a; margin: 4px 0; }
  .toast { position: fixed; bottom: 20px; left: 50%; -webkit-transform: translateX(-50%); transform: translateX(-50%); background: #1a3a2a; border: 1px solid #2d6a4f; color: #52b788; font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 10px 18px; border-radius: 6px; opacity: 0; -webkit-transition: opacity 0.2s; transition: opacity 0.2s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .toast.error { background: #2a1a1a; border-color: #6a2d2d; color: #b78852; }
  .all-off-btn { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; padding: 10px 16px; background: transparent; border: 1px solid #2a2a2a; color: #444; border-radius: 6px; cursor: pointer; }
  .expand-btn { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; background: none; border: none; cursor: pointer; padding: 0; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #444; margin-top: 2px; }
  .expand-btn .chevron { font-size: 12px; display: inline-block; margin-left: 6px; -webkit-transition: -webkit-transform 0.2s; transition: transform 0.2s; }
  .expand-btn.open .chevron { -webkit-transform: rotate(180deg); transform: rotate(180deg); }
  .color-preview-dot { width: 12px; height: 12px; border-radius: 50%; background: #333; -webkit-flex-shrink: 0; flex-shrink: 0; border: 1px solid #444; margin-right: 8px; }
  .collapsible { display: none; -webkit-flex-direction: column; flex-direction: column; padding-top: 10px; border-top: 1px solid #1a1a1a; margin-top: 6px; }
  .collapsible.open { display: -webkit-flex; display: flex; }
  .collapsible > * { margin-bottom: 10px; }
  .collapsible > *:last-child { margin-bottom: 0; }
  .color-wheel-row { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; }
  .color-wheel-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #444; letter-spacing: 0.1em; text-transform: uppercase; -webkit-flex-shrink: 0; flex-shrink: 0; margin-right: 12px; }
  input[type=color] { -webkit-appearance: none; appearance: none; width: 36px; height: 36px; border: 1px solid #333; border-radius: 6px; background: none; cursor: pointer; padding: 2px; -webkit-flex-shrink: 0; flex-shrink: 0; }
  input[type=color]::-webkit-color-swatch-wrapper { padding: 0; border-radius: 4px; }
  input[type=color]::-webkit-color-swatch { border: none; border-radius: 4px; }
  .all-color-row { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; -webkit-flex-wrap: wrap; flex-wrap: wrap; }
  .all-color-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #444; letter-spacing: 0.1em; text-transform: uppercase; -webkit-flex-shrink: 0; flex-shrink: 0; min-width: 28px; margin-right: 10px; }
  .piano-bulbs-grid { display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; }

  /* Dim overlay */
  #dim-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #000;
    opacity: 0;
    pointer-events: none;
    z-index: 9000;
    -webkit-transition: opacity 2s ease; transition: opacity 2s ease;
  }
  #dim-overlay.dimmed {
    opacity: 0.97;
    pointer-events: all;
  }
</style>
</head>

<div id="dim-overlay" onclick="wakeUp()"></div>

<div class="kiosk-root">

    <span class="header-title"><span class="status-dot" id="conn-dot"></span>Lights</span>

            <div class="collapsible" id="section-piano-left-color">

                <div class="swatch" style="background:#ffa94d" onclick="setColorOne('light.h600b','255,169,77','colors-piano-left','dot-piano-left',this)"></div>
                <div class="swatch" style="background:#ffe066" onclick="setColorOne('light.h600b','255,224,102','colors-piano-left','dot-piano-left',this)"></div>
                <div class="swatch" style="background:#ffd9a0" onclick="setColorOne('light.h600b','255,217,160','colors-piano-left','dot-piano-left',this)"></div>
                <div class="swatch" style="background:#ffffff" onclick="setColorOne('light.h600b','255,255,255','colors-piano-left','dot-piano-left',this)"></div>
                <div class="swatch" style="background:#74c69d" onclick="setColorOne('light.h600b','116,198,157','colors-piano-left','dot-piano-left',this)"></div>
                <div class="swatch" style="background:#4dabf7" onclick="setColorOne('light.h600b','77,171,247','colors-piano-left','dot-piano-left',this)"></div>
                <div class="swatch" style="background:#9775fa" onclick="setColorOne('light.h600b','151,117,250','colors-piano-left','dot-piano-left',this)"></div>
                <div class="swatch" style="background:#f783ac" onclick="setColorOne('light.h600b','247,131,172','colors-piano-left','dot-piano-left',this)"></div>
              </div>
              <div class="color-wheel-row">
                <span class="color-wheel-label">Custom</span>
                <input type="color" id="wheel-piano-left" value="#ffffff" onchange="setColorWheel('light.h600b', this.value, 'dot-piano-left', 'colors-piano-left')">
              </div>
            </div>
          </div>

          <div class="light-row" id="row-piano-mid">
            <div class="light-top">
              <span class="light-name" id="name-piano-mid">Middle</span>
              <label class="toggle-switch">
                <input type="checkbox" id="tog-piano-mid" onchange="toggleLight('light.h600b_2', this.checked, 'piano-mid')">
                <div class="toggle-track"></div>
              </label>
            </div>
            <button class="expand-btn" id="expand-piano-mid-color" onclick="toggleSection('piano-mid-color')">
              <span class="color-preview-dot" id="dot-piano-mid"></span>Color <span class="chevron">&#9662;</span>

            <div class="collapsible" id="section-piano-mid-color">

                <div class="swatch" style="background:#ff6b6b" onclick="setColorOne('light.h600b_2','255,107,107','colors-piano-mid','dot-piano-mid',this)"></div>
                <div class="swatch" style="background:#ffa94d" onclick="setColorOne('light.h600b_2','255,169,77','colors-piano-mid','dot-piano-mid',this)"></div>
                <div class="swatch" style="background:#ffe066" onclick="setColorOne('light.h600b_2','255,224,102','colors-piano-mid','dot-piano-mid',this)"></div>
                <div class="swatch" style="background:#ffd9a0" onclick="setColorOne('light.h600b_2','255,217,160','colors-piano-mid','dot-piano-mid',this)"></div>

                <div class="swatch" style="background:#9775fa" onclick="setColorOne('light.h600b_2','151,117,250','colors-piano-mid','dot-piano-mid',this)"></div>

                <span class="color-wheel-label">Custom</span>

              </div>
            </div>
          </div>

          <div class="light-row" id="row-piano-right">
            <div class="light-top">
              <span class="light-name" id="name-piano-right">Right</span>

                <div class="toggle-track"></div>

            </button>
            <div class="collapsible" id="section-piano-right-color">
              <div class="color-swatches" id="colors-piano-right">
                <div class="swatch" style="background:#ff6b6b" onclick="setColorOne('light.h600b_3','255,107,107','colors-piano-right','dot-piano-right',this)"></div>
                <div class="swatch" style="background:#ffa94d" onclick="setColorOne('light.h600b_3','255,169,77','colors-piano-right','dot-piano-right',this)"></div>
                <div class="swatch" style="background:#ffe066" onclick="setColorOne('light.h600b_3','255,224,102','colors-piano-right','dot-piano-right',this)"></div>
                <div class="swatch" style="background:#ffd9a0" onclick="setColorOne('light.h600b_3','255,217,160','colors-piano-right','dot-piano-right',this)"></div>
                <div class="swatch" style="background:#ffffff" onclick="setColorOne('light.h600b_3','255,255,255','colors-piano-right','dot-piano-right',this)"></div>
                <div class="swatch" style="background:#74c69d" onclick="setColorOne('light.h600b_3','116,198,157','colors-piano-right','dot-piano-right',this)"></div>
                <div class="swatch" style="background:#4dabf7" onclick="setColorOne('light.h600b_3','77,171,247','colors-piano-right','dot-piano-right',this)"></div>
                <div class="swatch" style="background:#9775fa" onclick="setColorOne('light.h600b_3','151,117,250','colors-piano-right','dot-piano-right',this)"></div>

  <!-- MOONBASE -->

      <span class="room-name">Moonbase</span>
      <label class="toggle-switch">
        <input type="checkbox" id="moonbase-all" onchange="toggleRoom('moonbase', this.checked)">
        <div class="toggle-track"></div>
      </label>
    </div>
    <div class="room-body">
      <div class="section-label">Brightness</div>
      <div class="brightness-row">
        <span class="brightness-label active" id="bri-lbl-moonbase">100%</span>
        <input type="range" min="1" max="255" value="255" id="bri-moonbase" onchange="setBrightnessRoom('moonbase', this.value)">
      </div>
      <div class="divider"></div>
      <div class="section-label">Scenes</div>
      <div class="scenes-row" id="moonbase-scenes">

        <button class="scene-btn" onclick="activateScene('scene.the_moonbase_sailor_cosmos', 'moonbase-scenes', this)">Sailor Cosmos</button>
        <button class="scene-btn" onclick="activateScene('scene.the_moonbase_pokemon', 'moonbase-scenes', this)">Pok&#233;mon</button>

  <!-- BEDROOM -->

        <span class="bedroom-label">Light</span>
        <label class="toggle-switch big-toggle">
          <input type="checkbox" id="tog-bedroom" onchange="toggleSwitch('switch.smart_indoor_plug_socket_1', this.checked)">
          <div class="toggle-track"></div>
        </label>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
</div>

<script>

  { entity: 'light.h600b_2', key: 'piano-mid' },

  { entity: 'light.moonbase_monitor_2', key: 'mb-mon2' }

var toastTimer;
var dimTimer;
var DIM_DELAY = 5 * 60 * 1000;

function resetDimTimer() {
  clearTimeout(dimTimer);
  dimTimer = setTimeout(function() {
    document.getElementById('dim-overlay').className = 'dimmed';
  }, DIM_DELAY);
}

function wakeUp() {
  document.getElementById('dim-overlay').className = '';
  resetDimTimer();
}

document.addEventListener('touchstart', function() { resetDimTimer(); }, true);
document.addEventListener('click', function() { resetDimTimer(); }, true);

resetDimTimer();

function showToast(msg, isError) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.className = 'toast'; }, 2000);
}

function callHA(domain, service, data) {
  var xhr = new XMLHttpRequest();
  xhr.open('POST', HA_URL + '/api/services/' + domain + '/' + service, true);
  xhr.setRequestHeader('Authorization', 'Bearer ' + TOKEN);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      if (xhr.status >= 200 && xhr.status < 300) {
        showToast('✓');
        document.getElementById('conn-dot').className = 'status-dot';
      } else {
        showToast('Error ' + xhr.status, true);
        document.getElementById('conn-dot').className = 'status-dot error';
      }
    }
  };
  xhr.onerror = function() {
    showToast('Connection error', true);
    document.getElementById('conn-dot').className = 'status-dot error';
  };
  xhr.send(JSON.stringify(data));
}

function toggleSection(id) {
  var sec = document.getElementById('section-' + id);
  var btn = document.getElementById('expand-' + id);
  if (!sec) return;
  if (sec.className.indexOf('open') >= 0) {
    sec.className = sec.className.replace(' open', '').replace('open', '');
    if (btn) btn.className = btn.className.replace(' open', '').replace('open', '');
  } else {
    sec.className = sec.className + ' open';
    if (btn) btn.className = btn.className + ' open';
  }
}

function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

function rgbToHex(r, g, b) {
  function toHex(v) { var h = v.toString(16); return h.length === 1 ? '0' + h : h; }
  return '#' + toHex(r) + toHex(g) + toHex(b);
}

function clearSwatches(id) {
  var swatches = document.querySelectorAll('#' + id + ' .swatch');
  for (var i = 0; i < swatches.length; i++) { swatches[i].className = 'swatch'; }
}

function setDot(dotId, hex) {
  var d = document.getElementById(dotId);
  if (d) d.style.background = hex;
}

function updateLightUI(key, on) {
  var tog = document.getElementById('tog-' + key);
  var name = document.getElementById('name-' + key);
  if (tog) tog.checked = on;
  if (name) name.className = on ? 'light-name on' : 'light-name';
}

function toggleLight(entity, on, key) {
  callHA('light', on ? 'turn_on' : 'turn_off', { entity_id: entity });
  updateLightUI(key, on);
}

function toggleSwitch(entity, on) {
  callHA('switch', on ? 'turn_on' : 'turn_off', { entity_id: entity });
}

function setBrightnessAll(val) {
  var pct = Math.round(val / 255 * 100);
  document.getElementById('bri-lbl-piano').textContent = pct + '%';
  for (var i = 0; i < PIANO_LIGHTS.length; i++) {
    callHA('light', 'turn_on', { entity_id: PIANO_LIGHTS[i].entity, brightness: parseInt(val) });
  }
  document.getElementById('piano-all').checked = true;
}

function setBrightnessRoom(room, val) {
  var pct = Math.round(val / 255 * 100);
  document.getElementById('bri-lbl-' + room).textContent = pct + '%';
  var lights = room === 'moonbase' ? MOONBASE_LIGHTS : [];
  for (var i = 0; i < lights.length; i++) {
    callHA('light', 'turn_on', { entity_id: lights[i].entity, brightness: parseInt(val) });
  }
  if (room === 'moonbase') document.getElementById('moonbase-all').checked = true;
}

function toggleRoom(room, on) {
  var lights = room === 'piano' ? PIANO_LIGHTS : MOONBASE_LIGHTS;
  for (var i = 0; i < lights.length; i++) {
    callHA('light', on ? 'turn_on' : 'turn_off', { entity_id: lights[i].entity });
    updateLightUI(lights[i].key, on);
  }
}

function setColorOne(entity, rgb, swatchId, dotId, el) {
  var parts = rgb.split(',');
  var r = parseInt(parts[0]), g = parseInt(parts[1]), b = parseInt(parts[2]);
  callHA('light', 'turn_on', { entity_id: entity, rgb_color: [r, g, b] });
  clearSwatches(swatchId);
  el.className = 'swatch active';
  setDot(dotId, el.style.background);
}

function setColorWheel(entity, hex, dotId, swatchId) {
  var rgb = hexToRgb(hex);
  callHA('light', 'turn_on', { entity_id: entity, rgb_color: rgb });
  clearSwatches(swatchId);
  setDot(dotId, hex);
}

function setColorAll(rgb, el) {
  var parts = rgb.split(',');
  var r = parseInt(parts[0]), g = parseInt(parts[1]), b = parseInt(parts[2]);
  for (var i = 0; i < PIANO_LIGHTS.length; i++) {
    callHA('light', 'turn_on', { entity_id: PIANO_LIGHTS[i].entity, rgb_color: [r, g, b] });
    updateLightUI(PIANO_LIGHTS[i].key, true);
    setDot('dot-' + PIANO_LIGHTS[i].key, el.style.background);
  }
  document.getElementById('piano-all').checked = true;
  clearSwatches('piano-all-colors');
  el.className = 'swatch active';
  clearSwatches('colors-piano-left');
  clearSwatches('colors-piano-mid');
  clearSwatches('colors-piano-right');
}

function setColorAllWheel(hex) {
  var rgb = hexToRgb(hex);
  for (var i = 0; i < PIANO_LIGHTS.length; i++) {
    callHA('light', 'turn_on', { entity_id: PIANO_LIGHTS[i].entity, rgb_color: rgb });
    updateLightUI(PIANO_LIGHTS[i].key, true);
    setDot('dot-' + PIANO_LIGHTS[i].key, hex);
  }
  document.getElementById('piano-all').checked = true;
  clearSwatches('piano-all-colors');
  clearSwatches('colors-piano-left');
  clearSwatches('colors-piano-mid');
  clearSwatches('colors-piano-right');
}

function activateScene(sceneId, containerId, btn) {
  callHA('scene', 'turn_on', { entity_id: sceneId });
  var btns = document.querySelectorAll('#' + containerId + ' .scene-btn');
  for (var i = 0; i < btns.length; i++) { btns[i].className = 'scene-btn'; }
  btn.className = 'scene-btn active';
  document.getElementById('moonbase-all').checked = true;
}

function allOff() {
  var allLights = PIANO_LIGHTS.concat(MOONBASE_LIGHTS);
  for (var i = 0; i < allLights.length; i++) {
    callHA('light', 'turn_off', { entity_id: allLights[i].entity });
    updateLightUI(allLights[i].key, false);
  }
  callHA('switch', 'turn_off', { entity_id: 'switch.smart_indoor_plug_socket_1' });
  document.getElementById('tog-bedroom').checked = false;
  document.getElementById('piano-all').checked = false;
  document.getElementById('moonbase-all').checked = false;
}

function fetchStates() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', HA_URL + '/api/states', true);
  xhr.setRequestHeader('Authorization', 'Bearer ' + TOKEN);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      if (xhr.status >= 200 && xhr.status < 300) {
        document.getElementById('conn-dot').className = 'status-dot';
        var states = JSON.parse(xhr.responseText);
        var map = {};
        for (var i = 0; i < states.length; i++) { map[states[i].entity_id] = states[i]; }

        var allLights = PIANO_LIGHTS.concat(MOONBASE_LIGHTS);
        for (var j = 0; j < allLights.length; j++) {
          var s = map[allLights[j].entity];
          if (!s) continue;
          var on = s.state === 'on';
          updateLightUI(allLights[j].key, on);
          if (on && s.attributes.rgb_color) {
            var rgb = s.attributes.rgb_color;
            var hex = rgbToHex(rgb[0], rgb[1], rgb[2]);
            setDot('dot-' + allLights[j].key, hex);
            var wheel = document.getElementById('wheel-' + allLights[j].key);
            if (wheel) wheel.value = hex;
          }
        }

        var pianoOn = false;
        var pianoBri = 0; var pianoBriCount = 0;
        for (var k = 0; k < PIANO_LIGHTS.length; k++) {
          var ps = map[PIANO_LIGHTS[k].entity];
          if (ps && ps.state === 'on') {
            pianoOn = true;
            if (ps.attributes.brightness) { pianoBri += ps.attributes.brightness; pianoBriCount++; }
          }
        }
        document.getElementById('piano-all').checked = pianoOn;
        if (pianoBriCount > 0) {
          var avgBri = Math.round(pianoBri / pianoBriCount);
          document.getElementById('bri-piano').value = avgBri;
          document.getElementById('bri-lbl-piano').textContent = Math.round(avgBri / 255 * 100) + '%';
        }

        var mbOn = false;
        var mbBri = 0; var mbBriCount = 0;
        for (var m = 0; m < MOONBASE_LIGHTS.length; m++) {
          var ms = map[MOONBASE_LIGHTS[m].entity];
          if (ms && ms.state === 'on') {
            mbOn = true;
            if (ms.attributes.brightness) { mbBri += ms.attributes.brightness; mbBriCount++; }
          }
        }
        document.getElementById('moonbase-all').checked = mbOn;
        if (mbBriCount > 0) {
          var avgMbBri = Math.round(mbBri / mbBriCount);
          document.getElementById('bri-moonbase').value = avgMbBri;
          document.getElementById('bri-lbl-moonbase').textContent = Math.round(avgMbBri / 255 * 100) + '%';
        }

        var bed = map['switch.smart_indoor_plug_socket_1'];
        if (bed) document.getElementById('tog-bedroom').checked = bed.state === 'on';
      } else {
        document.getElementById('conn-dot').className = 'status-dot error';
      }
    }
  };
  xhr.onerror = function() { document.getElementById('conn-dot').className = 'status-dot error'; };
  xhr.send();
}

fetchStates();
setInterval(fetchStates, 10000);
</script>
</body>
</html>
